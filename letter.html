<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>A Letter For You ❤️</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/letter.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<div class="letter-background"></div>

<main class="letter-section">

    <!-- Envelope -->
    <div class="envelope" id="envelope">

        <div class="envelope-top"></div>

        <div class="envelope-body"></div>

        <div class="heart-seal">❤️</div>

    </div>

    <!-- Full Letter -->
    <div class="full-letter" id="fullLetter">

        <h1>❤️ Happy Birthday ❤️</h1>

        <p id="typingText"></p>

        <!-- Final Signature -->

<div id="signature" class="signature">

    <h2>❤️ Made with Love ❤️</h2>

    <h3>— Anil Kumar —</h3>

    <p>✨ Thank You for Watching ✨</p>

</div>
    <!-- Replay Button -->
<button id="replayBtn" class="replay-btn">

    💖 Replay the Surprise

</button>

        <div class="flower left">🌸</div>
        <div class="flower right">🌸</div>

    </div>

    <!-- Memory Photos -->

<img src="assets/images/photo1.jpg" class="memory-photo photo1">
<img src="assets/images/photo2.jpg" class="memory-photo photo2">
<img src="assets/images/photo3.jpg" class="memory-photo photo3">
<img src="assets/images/photo4.jpg" class="memory-photo photo4">

</main>

<script src="js/effects/sparkles.js"></script>
<script src="js/letter.js"></script>

</body>

</html>
